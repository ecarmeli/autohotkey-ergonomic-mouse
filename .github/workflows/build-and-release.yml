name: Build and Package Installer

on:
  workflow_call:
    inputs:
      is_tag:
        description: 'Explicit flag indicating if the triggering event was a Git Tag push'
        required: true
        type: string
      tag_name:
        description: 'The actual tag string context'
        required: true
        type: string

jobs:
  # ==========================================
  # STAGE 1: BUILD (Windows)
  # ==========================================
  build:
    name: Build and Package Installer
    runs-on: windows-latest
    permissions:
      contents: write
    # We must expose these variables to the downstream jobs
    outputs:
      is_release_tag: ${{ steps.meta.outputs.is_release_tag }}
      true_version: ${{ steps.meta.outputs.true_version }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        fetch-depth: 0

    - name: Parse Git Reference Metadata
      id: meta
      run: |
        $trueRef = "${{ inputs.tag_name }}"
        $isTag = "${{ inputs.is_tag }}"
        
        if ($trueRef -notmatch '^[a-zA-Z0-9.\-\/]+$') {
            Write-Error "CRITICAL SECURITY FAULT: Malformed tag_name payload detected. Execution halted."
            exit 1
        }
        if ($isTag -ne "True" -and $isTag -ne "False") {
            Write-Error "CRITICAL SECURITY FAULT: Invalid boolean input '$isTag' for is_tag."
            exit 1
        }
            
        echo "true_version=$trueRef" >> $env:GITHUB_OUTPUT
        echo "is_release_tag=$isTag" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Download and Verify AutoHotkey Core
      run: |
        New-Item -ItemType Directory -Force -Path .\bin\AutoHotkey
        $url = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.26/AutoHotkey_2.0.26.zip"
        $expectedHash = "43522AA3122A57784AC5DB30ABF85C2244475C36ACD7796E2C993355F9E926AE"
        
        Invoke-WebRequest -Uri $url -OutFile .\ahk.zip
        $actualHash = (Get-FileHash .\ahk.zip -Algorithm SHA256).Hash.ToLower()
        
        if ($actualHash -ne $expectedHash.ToLower()) {
            Write-Error "CRITICAL SECURITY FAULT: Downloaded file hash mismatch!"
            Exit 1
        }
        Expand-Archive -Path .\ahk.zip -DestinationPath .\bin\AutoHotkey -Force
        Remove-Item -Path .\ahk.zip -Force
      shell: powershell

    - name: Compile Go Binaries
      run: |
        $version = "1.0.0"
        if ("${{ steps.meta.outputs.is_release_tag }}" -eq "True") { $version = "${{ steps.meta.outputs.true_version }}" }
        
        $buildTime = Get-Date -Format "yyyy-MM-dd_HH:mm:ss"
        $commit = git rev-parse --short HEAD
        $ldflags = "-s -w -H=windowsgui -X main.version=$version -X main.gitCommit=$commit -X main.buildTime=$buildTime"
        
        go build -ldflags "$ldflags" -o .\bin\Launcher.exe .\cmd\launcher\main.go
        go build -ldflags "$ldflags" -o .\bin\DeployManager.exe .\cmd\deploymanager\main.go
      shell: powershell

    - name: Compile Inno Setup Installer
      run: |
        $isccPath = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
        & $isccPath .\installer.iss
      shell: powershell
      
    - name: Upload Installer to Internal Workflow Storage
      uses: actions/upload-artifact@v7 # Upgraded to v4 for better cross-runner performance
      with:
        name: ErgonomicMouseSetup-Latest
        path: .\bin\ErgonomicMouseSetup.exe
        if-no-files-found: error
        retention-days: 1

  # ==========================================
  # STAGE 2: SECURITY SCAN (Linux)
  # ==========================================
  scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download Unverified Artifact
      uses: actions/download-artifact@v8
      with:
        name: ErgonomicMouseSetup-Latest
        path: ./bin

    - name: Scan Installer with ClamAV & YARA
      uses: hugoalh/scan-virus-ghaction@v0.20.0
      with:
        clamav_enable: True
        yara_enable: True
        # Target the file precisely
        ignores_pre: |-
          Param($ElementPreMeta)
          Return ($ElementPreMeta.Path -notlike '*bin/ErgonomicMouseSetup.exe')

  # ==========================================
  # STAGE 3: PUBLIC RELEASE (Linux)
  # ==========================================
  publish_release:
    name: Create Production Release
    needs: [build, scan] # The security gate: will not run if [scan] fails.
    if: needs.build.outputs.is_release_tag == 'True'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Verified Artifact
      uses: actions/download-artifact@v8
      with:
        name: ErgonomicMouseSetup-Latest
        path: ./bin

    - name: Publish GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: './bin/ErgonomicMouseSetup.exe'
        allowUpdates: true
        draft: false
        prerelease: false
        tag: ${{ needs.build.outputs.true_version }}
        name: Release ${{ needs.build.outputs.true_version }}
        # Automatically generates release notes from merged PRs
        generateReleaseNotes: true
        body: |
          Official compiled, malware-scanned production release for version ${{ needs.build.outputs.true_version }}.
          
          **Commit Context Evaluation:** `${{ github.event.workflow_run.head_sha || github.sha }}`
          
          ### 📦 Installation
          1. Download the raw `ErgonomicMouseSetup.exe` asset below.
          2. Execute the package to launch the deployment wizard interface.