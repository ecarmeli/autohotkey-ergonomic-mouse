name: Code Quality and Security Analysis

on:
  push:
    branches: [ main ]                  # Run on every push to main branch
    tags: [ "v*.*.*" ]                  # Ensures validation also runs on tag pushes
  pull_request:
    branches: [ main ]                  # Run on every PR targeting main

jobs:

  # ---------------------------------------------
  # CHANGE DETECTION
  # ---------------------------------------------
  detect_changes:
    name: Evaluate Path Changes
    runs-on: ubuntu-latest
    outputs:
      trigger_allowed: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        
      - name: Check modified files
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'cmd/**'
              - 'src/**'
              - 'go.mod'
              - 'go.sum'
              - 'installer.iss'

  # ---------------------------------------------
  # GO BUILD + LINT + FORMAT VALIDATION
  # ---------------------------------------------
  go_quality:
    name: Go Build & Lint
    runs-on: ubuntu-latest              # Use Linux runner (fast + standard for Go CI)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7       

      - name: Setup Go
        uses: actions/setup-go@v6       
        with:
          go-version: '1.26.4'          # Specify Go version
          cache: true                   # Enable module caching (speeds up builds)

      - name: Verify Build (exclude /bin dir)
        run: go build ./...             # Ensure the code compiles successfully (excluding /bin)  

      - name: Run go vet
        run: go vet ./...               # Static analysis for common coding mistakes

      - name: Check formatting
        run: |
          # Fail if any file is not properly formatted with gofmt
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run gofmt."
            gofmt -l .               # Print offending files
            exit 1                  # Fail the pipeline
          fi

      - name: Run staticcheck
        run: |
          # Install advanced static analysis tool
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...         # Run deeper linting checks

      - name: Build Windows binaries (Dry Run)
        run: |
          # Mirroring production linker flags for accurate dry-run validation
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H=windowsgui" -o bin/Launcher.exe ./cmd/launcher
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H=windowsgui" -o bin/DeployManager.exe ./cmd/deploymanager


  # ---------------------------------------------
  # GO DEPENDENCY VULNERABILITY SCAN
  # ---------------------------------------------
  go_security:
    name: Go Dependency Scan
    needs: go_quality                   # Only run if go_quality succeeded (fail-fast pipeline)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Run govulncheck
        run: |
          # Install official Go vulnerability scanner
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...         # Scan for known vulnerabilities in dependencies


  # ---------------------------------------------
  # REPOSITORY-LEVEL SECURITY SCAN (TRIVY)
  # ---------------------------------------------
  repository_security_scan:
    name: Workspace Vulnerability & Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.36.0 
        with:
          scan-type: 'fs'                         # Scan filesystem (entire repo)
          scan-ref: '.'                           # Start from repo root
          hide-progress: false                    # Show scan progress in logs
          format: 'table'                         # Human-readable output
          exit-code: '1'                          # Fail pipeline on findings
          ignore-unfixed: true                    # Ignore vulns without patches
          severity: 'CRITICAL,HIGH'               # Only fail on high-impact issues
          scanners: 'vuln,secret,config'          # Scan for vulnerabilities, secrets, and config issues

      - name: Save Tag Context for Downstream Build
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.ref_name }}" > triggering-tag.txt

      - name: Upload Tag Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: triggering-tag
          path: triggering-tag.txt


  # --------------------------------------------------------------------
  # Trigger the installer build directly within the same runtime context
  # --------------------------------------------------------------------
  trigger_build:
    name: Execute Production Build
    needs: [detect_changes, go_quality, go_security, repository_security_scan]
    
    # Execute only IF:
    # 1. It is a push event
    # And -
    # 2. It is either a Git Tag or the path filter detected application related changes.
    if: |
      github.event_name == 'push' && 
      (github.ref_type == 'tag' || needs.detect_changes.outputs.trigger_allowed == 'true')
      
    permissions:
      contents: write
    uses: ./.github/workflows/build-and-release.yml
    with:
      is_tag: ${{ github.ref_type == 'tag' && 'True' || 'False' }}
      tag_name: ${{ github.ref_name }}
    secrets: inherit